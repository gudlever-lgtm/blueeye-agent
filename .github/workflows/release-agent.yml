name: Build & publish agent binaries

# Produces the self-contained agent binaries the server serves at
# /enroll/agent/:platform (Node SEA — see scripts/build-sea.sh).
#
#   * Push a tag  v*      -> builds and attaches the binaries to a GitHub Release.
#   * Run manually        -> builds and uploads them as a downloadable artifact
#                            (no release), handy for testing before tagging.
#
# Publish them to a server with blueeye-server/scripts/fetch-agent-binaries.sh.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Space-separated platforms to build'
        default: 'linux-amd64 linux-arm64'
        required: false

permissions:
  contents: write # create the release / upload assets

concurrency:
  group: release-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Installs the runtime dependency (ws) so esbuild can bundle it. esbuild
      # and postject themselves are fetched on demand by the build script (npx),
      # keeping the agent's own dependency surface unchanged.
      - run: npm ci

      - name: Build SEA binaries
        run: bash scripts/build-sea.sh ${{ github.event.inputs.platforms || 'linux-amd64 linux-arm64' }}

      - name: Upload binaries as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueeye-agent-binaries
          path: |
            dist/blueeye-agent-*
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/blueeye-agent-* dist/SHA256SUMS \
            --title "blueeye-agent $GITHUB_REF_NAME" \
            --notes "Self-contained agent binaries (Node SEA) for glibc Linux.
          Verify against SHA256SUMS. Publish to a server with
          \`blueeye-server/scripts/fetch-agent-binaries.sh --tag $GITHUB_REF_NAME\`."
